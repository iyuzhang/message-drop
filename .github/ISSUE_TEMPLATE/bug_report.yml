name: Bug report
description: Report unexpected behavior or a crash
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a problem. Please fill in what you can; skip fields that do not apply.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing what went wrong.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps so someone else can see the same issue.
      placeholder: |
        1. …
        2. …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Server (Node)
        - Web UI
        - Android app
        - CLI
        - Not sure
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version or commit
      description: App/server version, git SHA, or release tag if known.

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, browser, device model — whatever helps.
      render: markdown

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Redact secrets, tokens, and personal paths before pasting.

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmation
      options:
        - label: I have searched existing issues for duplicates
          required: true
