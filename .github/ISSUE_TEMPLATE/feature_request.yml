name: Feature request
description: Suggest an idea or improvement
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        Share context so maintainers can evaluate fit with message-drop’s goals (LAN file and message sharing, simple self-hosted setup).

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to do? What is painful or missing today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like message-drop to behave? APIs, UX, or workflow sketches welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought of, or workarounds you use now.

  - type: dropdown
    id: scope
    attributes:
      label: Primary area
      options:
        - Server
        - Web UI
        - Android
        - CLI
        - Documentation
        - Other
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmation
      options:
        - label: I have checked open issues for similar requests
          required: true
